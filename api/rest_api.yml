openapi: 3.1.0
info:
  title: Travel Social Network API
  version: 1.0.0

paths:
  /media/upload-url/:
    post:
      summary: Get a presigned URL for direct upload to blob storage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filename, content_type]
              properties:
                filename:
                  type: string
                content_type:
                  type: string
                  example: image/webp
      responses:
        "200":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  upload_url:
                    type: string
                    description: Presigned S3 URL for PUT upload (expires in 15 min)
                  blob_key:
                    type: string
                    description: Key to reference the blob after upload
                  expires_at:
                    type: string
                    format: date-time
        "400":
          description: Invalid request

  /media/:
    post:
      summary: Upload media files directly to S3 (S3 endpoint, max 512 KB per file)
      description: >
        This is a direct-to-S3 multipart upload endpoint. Each individual file
        must not exceed 512 KB. Use /media/upload-url/ to obtain a presigned URL
        for single-file uploads instead.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                    description: Single file, max 512 KB
                    maxLength: 524288
                  maxItems: 10
      responses:
        "201":
          description: Uploaded blob references
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlobRef"
        "400":
          description: Invalid files or file size exceeded

  /posts/:
    post:
      summary: Create a post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostCreate"
      responses:
        "201":
          description: Post created
        "400":
          description: Invalid input

    get:
      summary: Search posts by location or get user/subscription feed
      parameters:
        - name: location
          in: query
          schema:
            type: string
          description: Location name to search (e.g. "paris")
        - name: from
          in: query
          schema:
            type: string
          description: Country/region filter (e.g. "france")
        - name: user_id
          in: query
          schema:
            type: string
            format: uuid
          description: Get feed for a specific user; omit for subscription feed
        - name: cursor
          in: query
          schema:
            type: string
          description: Pagination cursor for reverse-chronological scroll
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            maximum: 10
      responses:
        "200":
          description: List of posts
          content:
            application/json:
              schema:
                type: object
                properties:
                  posts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Post"
                  next_cursor:
                    type: string
                    nullable: true

  /posts/{post_id}/:
    delete:
      summary: Delete a post
      parameters:
        - name: post_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "403":
          description: Not the post owner
        "404":
          description: Post not found

  /posts/{post_id}/comments/:
    post:
      summary: Add a comment to a post
      parameters:
        - name: post_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  maxLength: 1024
      responses:
        "201":
          description: Comment created
        "404":
          description: Post not found

    get:
      summary: Get comments for a post (includes reactions per comment)
      parameters:
        - name: post_id
          in: path
          required: true
          schema:
            type: integer
        - name: cursor
          in: query
          schema:
            type: string
          description: Pagination cursor
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 50
      responses:
        "200":
          description: List of comments with reactions
          content:
            application/json:
              schema:
                type: object
                properties:
                  comments:
                    type: array
                    items:
                      $ref: "#/components/schemas/Comment"
                  next_cursor:
                    type: string
                    nullable: true
        "404":
          description: Post not found

  /posts/{post_id}/reactions/:
    post:
      summary: Add a reaction to a post
      parameters:
        - name: post_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type:
                  type: string
                  enum: [like, love, wow, sad, angry]
      responses:
        "201":
          description: Reaction added
        "409":
          description: Already reacted
        "404":
          description: Post not found

    delete:
      summary: Remove a reaction from a post
      parameters:
        - name: post_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Reaction removed
        "404":
          description: Reaction not found

  /subscriptions/:
    post:
      summary: Subscribe to a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id:
                  type: string
                  format: uuid
      responses:
        "201":
          description: Subscribed
        "409":
          description: Already subscribed

    delete:
      summary: Unsubscribe from a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id:
                  type: string
                  format: uuid
      responses:
        "204":
          description: Unsubscribed
        "404":
          description: Subscription not found

    get:
      summary: Get users the current user is subscribed to
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 50
      responses:
        "200":
          description: List of subscriptions
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserRef"
                  next_cursor:
                    type: string
                    nullable: true

  /subscribers/:
    get:
      summary: Get users subscribed to the current user
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 50
      responses:
        "200":
          description: List of subscribers
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserRef"
                  next_cursor:
                    type: string
                    nullable: true

components:
  schemas:
    BlobRef:
      type: object
      properties:
        blob_key:
          type: string
          description: Storage key for the blob
        fn:
          type: string
          description: Server-assigned filename (e.g. pic1.webp)
        order:
          type: integer
          description: Display order within the post

    PostCreate:
      type: object
      required: [description, latitude, longitude]
      properties:
        description:
          type: string
          maxLength: 4096
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
        blobs:
          type: array
          items:
            $ref: "#/components/schemas/BlobRef"
          maxItems: 10

    Post:
      type: object
      properties:
        id:
          type: integer
        author_id:
          type: string
          format: uuid
        description:
          type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        blobs:
          type: array
          items:
            $ref: "#/components/schemas/BlobRef"
        reaction_count:
          type: integer
        comment_count:
          type: integer
        created_at:
          type: string
          format: date-time

    Comment:
      type: object
      properties:
        id:
          type: integer
        author_id:
          type: string
          format: uuid
        content:
          type: string
        parent_comment_id:
          type: integer
          nullable: true
        reactions:
          type: array
          items:
            $ref: "#/components/schemas/Reaction"
        created_at:
          type: string
          format: date-time

    Reaction:
      type: object
      properties:
        type:
          type: string
          enum: [like, love, wow, sad, angry]
        count:
          type: integer

    UserRef:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
